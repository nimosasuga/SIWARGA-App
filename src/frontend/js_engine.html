<script>
  /**
   * ==========================================
   * S.I.W.A.R.G.A - DOM ENGINE
   * Pure DOM Manipulation (NO innerHTML)
   * ==========================================
   */

  // State Global UI
  const UI_STATE = {
    isSidebarOpen: false,
  };

  /**
   * PABRIK IKON VEKTOR PREMIUM (Murni DOM, Zero-Latency, Tanpa Library)
   */
  function createSvgIcon(name) {
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("width", "20");
    svg.setAttribute("height", "20");
    svg.setAttribute("fill", "none");
    svg.setAttribute("stroke", "currentColor");
    svg.setAttribute("stroke-width", "2");
    svg.setAttribute("stroke-linecap", "round");
    svg.setAttribute("stroke-linejoin", "round");

    let paths = [];
    switch (name) {
      case "dashboard": // Ikon Grid Modern
        paths = ["M3 3h7v7H3z", "M14 3h7v7h-7z", "M14 14h7v7h-7z", "M3 14h7v7H3z"];
        break;
      case "warga": // Ikon Users
        paths = ["M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2", "M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"];
        break;
      case "data": // Ikon Dokumen Data
        paths = ["M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z", "M14 2v6h6", "M16 13H8", "M16 17H8", "M10 9H8"];
        break;
      case "keuangan": // Ikon Koper / Kas
        paths = ["M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2z", "M16 7V5h-8v2"];
        break;
      case "iuran": // Ikon Kartu Kredit
        paths = ["M1 4h22v16H1z", "M1 10h22"];
        break;
      case "sistem": // Ikon Pengaturan / Gear
        paths = [
          "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
          "M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z",
        ];
        break;
      case "profil": // Ikon Kartu ID Card
        paths = ["M3 5h18c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2H3c-1.1 0-2-.9-2-2V7c0-1.1.9-2 2-2z", "M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4z", "M4 15c0-1.5 2.5-2.5 4-2.5s4 1 4 2.5", "M14 9h5", "M14 13h5"];
        break;
      case "logout": // Ikon Log Out
        paths = ["M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4", "M16 17l5-5-5-5", "M21 12H9"];
        break;
      case "chevron-left": // Toggle Collapse Kiri
        paths = ["M15 18l-6-6 6-6"];
        break;
      case "chevron-right": // Toggle Expand Kanan
        paths = ["M9 18l6-6-6-6"];
        break;
      case "logo": // Mini Gedung Corporate Logo
        paths = ["M3 21h18", "M5 21V7l8-4v18", "M19 21V11l-6-3", "M9 9v.01", "M9 13v.01", "M9 17v.01"];
        break;
      case "menu-burger": // Hamburger Menu
        paths = ["M3 12h18", "M3 6h18", "M3 18h18"];
        break;
    }

    paths.forEach((d) => {
      const path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", d);
      svg.appendChild(path);
    });
    return svg;
  }

  /**
   * Merakit kerangka utama aplikasi (Sidebar Vector, Collapse State, Navbar RBAC)
   */
  function renderAppLayout() {
    const appRoot = document.getElementById("app-root");
    if (!appRoot) throw new Error("Fatal Error: Elemen #app-root tidak ditemukan.");

    if (!UI_STATE.user) {
      renderLoginScreen();
      return;
    }

    if (UI_STATE.isSidebarCollapsed === undefined) UI_STATE.isSidebarCollapsed = false;

    appRoot.textContent = "";

    const overlay = document.createElement("div");
    overlay.className = "sidebar-overlay";
    overlay.id = "sidebarOverlay";
    overlay.addEventListener("click", toggleSidebar);

    const sidebar = document.createElement("aside");
    sidebar.className = "sidebar";
    sidebar.id = "appSidebar";
    if (UI_STATE.isSidebarCollapsed) sidebar.classList.add("collapsed");

    const sidebarHeader = document.createElement("div");
    sidebarHeader.className = "sidebar-header";

    const titleContainer = document.createElement("div");
    titleContainer.className = "sidebar-title-container";

    const titleIcon = document.createElement("div");
    titleIcon.className = "sidebar-title-icon";
    titleIcon.appendChild(createSvgIcon("logo"));

    const titleText = document.createElement("div");
    titleText.className = "sidebar-title-text";
    titleText.textContent = "SIWARGA";

    titleContainer.appendChild(titleIcon);
    titleContainer.appendChild(titleText);

    const collapseBtn = document.createElement("button");
    collapseBtn.className = "btn-collapse";
    collapseBtn.appendChild(createSvgIcon(UI_STATE.isSidebarCollapsed ? "chevron-right" : "chevron-left"));

    collapseBtn.addEventListener("click", () => {
      UI_STATE.isSidebarCollapsed = !UI_STATE.isSidebarCollapsed;
      if (UI_STATE.isSidebarCollapsed) {
        sidebar.classList.add("collapsed");
        collapseBtn.innerHTML = "";
        collapseBtn.appendChild(createSvgIcon("chevron-right"));
      } else {
        sidebar.classList.remove("collapsed");
        collapseBtn.innerHTML = "";
        collapseBtn.appendChild(createSvgIcon("chevron-left"));
      }
    });

    sidebarHeader.appendChild(titleContainer);
    sidebarHeader.appendChild(collapseBtn);
    sidebar.appendChild(sidebarHeader);

    const menuContainer = document.createElement("nav");
    menuContainer.className = "menu-container";

    // PENAMBAHAN HAK AKSES KORLAP_GANG
    const menuConfig = [
      { id: "dashboard", title: "Dashboard Utama", icon: "dashboard", roles: ["SUPER_ADMIN", "KETUA_RT", "PENGURUS", "KORLAP_GANG", "WARGA"] },
      { id: "warga", title: "Manajemen Warga", icon: "warga", roles: ["SUPER_ADMIN", "KETUA_RT", "KORLAP_GANG"] },
      { id: "data", title: "Data Penduduk", icon: "data", roles: ["SUPER_ADMIN", "PENGURUS"] },
      { id: "keuangan", title: "Kas & Keuangan", icon: "keuangan", roles: ["SUPER_ADMIN", "KETUA_RT", "PENGURUS"] },
      { id: "iuran", title: "Iuran Saya", icon: "iuran", roles: ["KORLAP_GANG", "WARGA"] },
      // MENU BARU DITAMBAHKAN DI SINI (Terbuka untuk semua Role)
      { id: "profil", title: "Pengaturan Profil", icon: "profil", roles: ["SUPER_ADMIN", "KETUA_RT", "PENGURUS", "KORLAP_GANG", "WARGA"] },
      { id: "sistem", title: "Pengaturan Sistem", icon: "sistem", roles: ["SUPER_ADMIN"] },
    ];

    const userRole = UI_STATE.user.role;

    menuConfig.forEach((item) => {
      if (item.roles.includes(userRole)) {
        const menuItem = document.createElement("div");
        menuItem.className = "menu-item";

        menuItem.id = "menu-" + item.id;

        if (item.id === "dashboard") menuItem.classList.add("active");

        const iconSpan = document.createElement("span");
        iconSpan.className = "menu-item-icon";
        iconSpan.appendChild(createSvgIcon(item.icon));

        const textSpan = document.createElement("span");
        textSpan.className = "menu-item-text";
        textSpan.textContent = item.title;

        menuItem.appendChild(iconSpan);
        menuItem.appendChild(textSpan);

        menuItem.addEventListener("click", () => {
          switchPage(item.id);
          if (window.innerWidth <= 768 && UI_STATE.isSidebarOpen) toggleSidebar();
        });

        menuContainer.appendChild(menuItem);
      }
    });

    const logoutBtn = document.createElement("div");
    logoutBtn.className = "menu-item menu-logout";
    const logoutIcon = document.createElement("span");
    logoutIcon.className = "menu-item-icon";
    logoutIcon.appendChild(createSvgIcon("logout"));
    const logoutText = document.createElement("span");
    logoutText.className = "menu-item-text";
    logoutText.textContent = "Keluar Sistem";
    logoutBtn.appendChild(logoutIcon);
    logoutBtn.appendChild(logoutText);

    logoutBtn.addEventListener("click", () => {
      UI_STATE.user = null;
      renderLoginScreen();
    });

    menuContainer.appendChild(logoutBtn);
    sidebar.appendChild(menuContainer);

    const mainContent = document.createElement("main");
    mainContent.className = "main-content";
    mainContent.id = "mainContent";

    const topNavbar = document.createElement("header");
    topNavbar.style.height = "var(--header-height)";
    topNavbar.style.backgroundColor = "#fff";
    topNavbar.style.borderBottom = "1px solid #e2e8f0";
    topNavbar.style.display = "flex";
    topNavbar.style.alignItems = "center";
    topNavbar.style.padding = "0 20px";

    const menuBtn = document.createElement("button");
    menuBtn.appendChild(createSvgIcon("menu-burger"));
    menuBtn.style.background = "none";
    menuBtn.style.border = "none";
    menuBtn.style.cursor = "pointer";
    menuBtn.style.color = "#0f172a";
    menuBtn.style.display = window.innerWidth > 768 ? "none" : "block";

    window.addEventListener("resize", () => {
      if (window.innerWidth > 768) {
        menuBtn.style.display = "none";
        if (UI_STATE.isSidebarOpen) toggleSidebar();
      } else {
        menuBtn.style.display = "block";
      }
    });

    menuBtn.addEventListener("click", toggleSidebar);
    topNavbar.appendChild(menuBtn);

    const profileContainer = document.createElement("div");
    profileContainer.className = "topbar-profile";

    const profileInfo = document.createElement("div");
    profileInfo.className = "profile-info";
    const profileName = document.createElement("div");
    profileName.className = "profile-name";
    profileName.textContent = UI_STATE.user.nama;
    const profileRole = document.createElement("div");
    profileRole.className = "profile-role";
    profileRole.textContent = UI_STATE.user.jabatan + " - " + UI_STATE.user.blokRumah;
    profileInfo.appendChild(profileName);
    profileInfo.appendChild(profileRole);

    const profileAvatar = document.createElement("div");
    profileAvatar.className = "profile-avatar";
    profileAvatar.textContent = UI_STATE.user.nama.charAt(0).toUpperCase();

    profileContainer.appendChild(profileInfo);
    profileContainer.appendChild(profileAvatar);
    topNavbar.appendChild(profileContainer);
    mainContent.appendChild(topNavbar);

    const pageContainer = document.createElement("div");
    pageContainer.id = "pageContainer";
    pageContainer.style.padding = "30px";

    mainContent.appendChild(pageContainer);
    appRoot.appendChild(overlay);
    appRoot.appendChild(sidebar);
    appRoot.appendChild(mainContent);

    switchPage("dashboard");
  }

  /**
   * Logika buka/tutup Sidebar (Fluid Animation)
   */
  function toggleSidebar() {
    const sidebar = document.getElementById("appSidebar");
    const overlay = document.getElementById("sidebarOverlay");

    if (!sidebar || !overlay) return;

    UI_STATE.isSidebarOpen = !UI_STATE.isSidebarOpen;

    if (UI_STATE.isSidebarOpen) {
      sidebar.classList.add("active");
      overlay.classList.add("active");
    } else {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    }
  }

  /**
   * Merender UI Modern Corporate dengan Efek Visual Partikel dan Auto-Scroll Mobile
   */
  function renderLoginScreen() {
    const appRoot = document.getElementById("app-root");
    appRoot.textContent = "";

    // Wrapper & Panel Utama
    const wrapper = document.createElement("div");
    wrapper.className = "login-wrapper";

    // Injeksi Partikel/Blob Background
    const blob1 = document.createElement("div");
    blob1.className = "corp-blob blob-primary";
    const blob2 = document.createElement("div");
    blob2.className = "corp-blob blob-secondary";

    wrapper.appendChild(blob1);
    wrapper.appendChild(blob2);

    const panel = document.createElement("div");
    panel.className = "login-panel";

    // 1. Container Logo Vektor SVG
    const logoContainer = document.createElement("div");
    logoContainer.className = "login-logo-container";

    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("width", "54");
    svg.setAttribute("height", "54");
    svg.setAttribute("fill", "none");
    svg.setAttribute("stroke", "#0f172a"); // Menyesuaikan warna tombol korporat
    svg.setAttribute("stroke-width", "2");
    svg.setAttribute("stroke-linecap", "round");
    svg.setAttribute("stroke-linejoin", "round");

    const path1 = document.createElementNS(svgNS, "path");
    path1.setAttribute("d", "M3 21h18");
    const path2 = document.createElementNS(svgNS, "path");
    path2.setAttribute("d", "M5 21V7l8-4v18");
    const path3 = document.createElementNS(svgNS, "path");
    path3.setAttribute("d", "M19 21V11l-6-3");
    const path4 = document.createElementNS(svgNS, "path");
    path4.setAttribute("d", "M9 9v.01");
    const path5 = document.createElementNS(svgNS, "path");
    path5.setAttribute("d", "M9 13v.01");
    const path6 = document.createElementNS(svgNS, "path");
    path6.setAttribute("d", "M9 17v.01");

    svg.appendChild(path1);
    svg.appendChild(path2);
    svg.appendChild(path3);
    svg.appendChild(path4);
    svg.appendChild(path5);
    svg.appendChild(path6);
    logoContainer.appendChild(svg);

    // 2. Teks Judul
    const logoText = document.createElement("div");
    logoText.className = "login-logo-text";
    logoText.textContent = "SIWARGA APP";

    // 3. Tagline Khas Corporate
    const tagline = document.createElement("div");
    tagline.className = "login-tagline";
    tagline.textContent = "Sistem Manajemen Terpadu Ekosistem Warga";

    // 4. Group Username
    const userGroup = document.createElement("div");
    userGroup.className = "input-group";
    const userLabel = document.createElement("label");
    userLabel.className = "login-label";
    userLabel.textContent = "Username";
    const userInput = document.createElement("input");
    userInput.type = "text";
    userInput.id = "inputUsername";
    userInput.className = "login-input";
    userInput.placeholder = "Masukkan username";

    userGroup.appendChild(userLabel);
    userGroup.appendChild(userInput);

    // 5. Group Password
    const passGroup = document.createElement("div");
    passGroup.className = "input-group";
    const passLabel = document.createElement("label");
    passLabel.className = "login-label";
    passLabel.textContent = "Password";
    const passInput = document.createElement("input");
    passInput.type = "password";
    passInput.id = "inputPassword";
    passInput.className = "login-input";
    passInput.placeholder = "••••••••";

    passGroup.appendChild(passLabel);
    passGroup.appendChild(passInput);

    // 6. Area Error & Tombol Login
    const errorMsg = document.createElement("div");
    errorMsg.className = "error-msg";

    const loginBtn = document.createElement("button");
    loginBtn.className = "login-btn";
    loginBtn.textContent = "Masuk ke Sistem";

    // 7. Logika Eksekusi Login
    loginBtn.addEventListener("click", () => {
      const username = document.getElementById("inputUsername").value.trim();
      const password = document.getElementById("inputPassword").value.trim();

      if (!username || !password) {
        errorMsg.textContent = "Username dan password wajib diisi.";
        return;
      }

      loginBtn.textContent = "Memverifikasi...";
      loginBtn.disabled = true;
      errorMsg.textContent = "";

      google.script.run
        .withSuccessHandler((userData) => {
          UI_STATE.user = userData;
          renderAppLayout();
        })
        .withFailureHandler((error) => {
          errorMsg.textContent = error.message;
          loginBtn.textContent = "Masuk ke Sistem";
          loginBtn.disabled = false;
        })
        .authenticateUser(username, password);
    });

    // 8. Susun Panel & Eksekusi ke DOM
    panel.appendChild(logoContainer);
    panel.appendChild(logoText);
    panel.appendChild(tagline);
    panel.appendChild(userGroup);
    panel.appendChild(passGroup);
    panel.appendChild(loginBtn);
    panel.appendChild(errorMsg);

    wrapper.appendChild(panel);
    appRoot.appendChild(wrapper);
  }

  /**
   * S.I.W.A.R.G.A - TOAST NOTIFICATION ENGINE
   */
  function showToast(message, type = "success") {
    let container = document.getElementById("toast-container");
    if (!container) {
      container = document.createElement("div");
      container.id = "toast-container";
      container.className = "toast-container";
      document.body.appendChild(container);
    }

    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    toast.textContent = message;

    container.appendChild(toast);

    // Animasi masuk
    setTimeout(() => toast.classList.add("show"), 10);

    // Animasi keluar & auto-remove setelah 3.5 detik
    setTimeout(() => {
      toast.classList.remove("show");
      setTimeout(() => toast.remove(), 300);
    }, 3500);
  }

  /**
   * S.I.W.A.R.G.A - CUSTOM CONFIRM DIALOG ENGINE
   */
  function showConfirm(titleText, messageText, onConfirmCallback) {
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.style.zIndex = "9999";

    const box = document.createElement("div");
    box.className = "modal-box";
    box.style.maxWidth = "420px";

    const header = document.createElement("div");
    header.className = "modal-header";
    header.textContent = titleText;

    const body = document.createElement("div");
    body.className = "modal-body";
    body.textContent = messageText;
    body.style.color = "#475569";
    body.style.lineHeight = "1.6";

    const footer = document.createElement("div");
    footer.className = "modal-footer";

    const btnBatal = document.createElement("button");
    btnBatal.className = "btn-secondary";
    btnBatal.textContent = "Batal";
    btnBatal.onclick = () => {
      overlay.classList.remove("show");
      setTimeout(() => overlay.remove(), 300);
    };

    const btnLanjut = document.createElement("button");
    btnLanjut.className = "btn-danger";
    btnLanjut.textContent = "Ya, Hapus Permanen";
    btnLanjut.onclick = () => {
      overlay.classList.remove("show");
      setTimeout(() => overlay.remove(), 300);
      onConfirmCallback(); // Eksekusi fungsi penghapusan
    };

    footer.appendChild(btnBatal);
    footer.appendChild(btnLanjut);
    box.appendChild(header);
    box.appendChild(body);
    box.appendChild(footer);
    overlay.appendChild(box);

    document.body.appendChild(overlay);
    setTimeout(() => overlay.classList.add("show"), 10);
  }

  // 5. BOOTING ENGINE MENGGUNAKAN TRY-CATCH
  // UBAH BAGIAN INI:
  try {
    // Ganti renderAppLayout() menjadi renderLoginScreen()
    renderLoginScreen();
  } catch (error) {
    console.error("DOM Engine Crash:", error);
    const root = document.getElementById("app-root");
    if (root) {
      root.textContent = "CRASH DETECTED: " + error.message;
    }
  }
</script>
