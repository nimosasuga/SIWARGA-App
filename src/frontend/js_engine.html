<script>
  /**
   * ==========================================
   * S.I.W.A.R.G.A - DOM ENGINE
   * Pure DOM Manipulation (NO innerHTML)
   * ==========================================
   */

  // State Global UI
  const UI_STATE = {
    isSidebarOpen: false,
  };

  /**
   * Merakit kerangka utama aplikasi (Sidebar, Navbar, Area Konten)
   */
  function renderAppLayout() {
    const appRoot = document.getElementById("app-root");

    if (!appRoot) {
      throw new Error("Fatal Error: Elemen #app-root tidak ditemukan.");
    }

    appRoot.textContent = ""; // Bersihkan teks loading awal

    // 1. Buat Overlay (Background gelap saat sidebar terbuka di Mobile)
    const overlay = document.createElement("div");
    overlay.className = "sidebar-overlay";
    overlay.id = "sidebarOverlay";
    overlay.addEventListener("click", toggleSidebar); // Tutup sidebar jika overlay diklik

    // 2. Buat Sidebar Container
    const sidebar = document.createElement("aside");
    sidebar.className = "sidebar";
    sidebar.id = "appSidebar";

    // 2a. Header Sidebar (Logo/Judul)
    const sidebarHeader = document.createElement("div");
    sidebarHeader.style.padding = "20px";
    sidebarHeader.style.borderBottom = "1px solid var(--border-color)";
    sidebarHeader.style.fontWeight = "bold";
    sidebarHeader.style.fontSize = "1.3rem";
    sidebarHeader.style.color = "var(--primary)";
    sidebarHeader.textContent = "SIWARGA APP";
    sidebar.appendChild(sidebarHeader);

    // 2b. Wadah Menu Dinamis (Kosongkan dulu, nanti diisi via RBAC)
    const menuContainer = document.createElement("nav");
    menuContainer.id = "menuContainer";
    menuContainer.style.flex = "1";
    menuContainer.style.padding = "10px";
    menuContainer.style.overflowY = "auto";
    sidebar.appendChild(menuContainer);

    // 3. Buat Main Content Area
    const mainContent = document.createElement("main");
    mainContent.className = "main-content";
    mainContent.id = "mainContent";

    // 3a. Navbar Atas (Header Area)
    const topNavbar = document.createElement("header");
    topNavbar.style.height = "var(--header-height)";
    topNavbar.style.backgroundColor = "#fff";
    topNavbar.style.borderBottom = "1px solid var(--border-color)";
    topNavbar.style.display = "flex";
    topNavbar.style.alignItems = "center";
    topNavbar.style.padding = "0 20px";

    // Tombol Hamburger (Khusus Mobile)
    const menuBtn = document.createElement("button");
    menuBtn.textContent = "☰"; // Menggunakan textContent yang lebih aman dari innerHTML
    menuBtn.style.background = "none";
    menuBtn.style.border = "none";
    menuBtn.style.fontSize = "1.5rem";
    menuBtn.style.cursor = "pointer";
    menuBtn.style.color = "var(--text-main)";

    // Sembunyikan tombol di layar desktop (lebar > 768px)
    if (window.innerWidth > 768) {
      menuBtn.style.display = "none";
    }

    // Listener Resize: Otomatis memunculkan/menyembunyikan tombol saat layar ditarik
    window.addEventListener("resize", () => {
      if (window.innerWidth > 768) {
        menuBtn.style.display = "none";
        if (UI_STATE.isSidebarOpen) toggleSidebar();
      } else {
        menuBtn.style.display = "block";
      }
    });

    menuBtn.addEventListener("click", toggleSidebar);

    topNavbar.appendChild(menuBtn);
    mainContent.appendChild(topNavbar);

    // 3b. Wadah Halaman Dinamis (Tempat tabel/form akan dirender)
    const pageContainer = document.createElement("div");
    pageContainer.id = "pageContainer";
    pageContainer.style.padding = "20px";
    pageContainer.textContent = "Modul Login & Dashboard akan dimuat di sini...";
    mainContent.appendChild(pageContainer);

    // 4. Injeksi semua ke Root (Menyusun DOM)
    appRoot.appendChild(overlay);
    appRoot.appendChild(sidebar);
    appRoot.appendChild(mainContent);
  }

  /**
   * Logika buka/tutup Sidebar (Fluid Animation)
   */
  function toggleSidebar() {
    const sidebar = document.getElementById("appSidebar");
    const overlay = document.getElementById("sidebarOverlay");

    if (!sidebar || !overlay) return;

    UI_STATE.isSidebarOpen = !UI_STATE.isSidebarOpen;

    if (UI_STATE.isSidebarOpen) {
      sidebar.classList.add("active");
      overlay.classList.add("active");
    } else {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    }
  }

  /**
   * Merender UI Modern Corporate dengan Efek Visual Partikel dan Auto-Scroll Mobile
   */
  function renderLoginScreen() {
    const appRoot = document.getElementById("app-root");
    appRoot.textContent = "";

    // Wrapper & Panel Utama
    const wrapper = document.createElement("div");
    wrapper.className = "login-wrapper";

    // Injeksi Partikel/Blob Background
    const blob1 = document.createElement("div");
    blob1.className = "corp-blob blob-primary";
    const blob2 = document.createElement("div");
    blob2.className = "corp-blob blob-secondary";

    wrapper.appendChild(blob1);
    wrapper.appendChild(blob2);

    const panel = document.createElement("div");
    panel.className = "login-panel";

    // 1. Container Logo Vektor SVG
    const logoContainer = document.createElement("div");
    logoContainer.className = "login-logo-container";

    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("width", "54");
    svg.setAttribute("height", "54");
    svg.setAttribute("fill", "none");
    svg.setAttribute("stroke", "#0f172a"); // Menyesuaikan warna tombol korporat
    svg.setAttribute("stroke-width", "2");
    svg.setAttribute("stroke-linecap", "round");
    svg.setAttribute("stroke-linejoin", "round");

    const path1 = document.createElementNS(svgNS, "path");
    path1.setAttribute("d", "M3 21h18");
    const path2 = document.createElementNS(svgNS, "path");
    path2.setAttribute("d", "M5 21V7l8-4v18");
    const path3 = document.createElementNS(svgNS, "path");
    path3.setAttribute("d", "M19 21V11l-6-3");
    const path4 = document.createElementNS(svgNS, "path");
    path4.setAttribute("d", "M9 9v.01");
    const path5 = document.createElementNS(svgNS, "path");
    path5.setAttribute("d", "M9 13v.01");
    const path6 = document.createElementNS(svgNS, "path");
    path6.setAttribute("d", "M9 17v.01");

    svg.appendChild(path1);
    svg.appendChild(path2);
    svg.appendChild(path3);
    svg.appendChild(path4);
    svg.appendChild(path5);
    svg.appendChild(path6);
    logoContainer.appendChild(svg);

    // 2. Teks Judul
    const logoText = document.createElement("div");
    logoText.className = "login-logo-text";
    logoText.textContent = "SIWARGA APP";

    // 3. Tagline Khas Corporate
    const tagline = document.createElement("div");
    tagline.className = "login-tagline";
    tagline.textContent = "Sistem Manajemen Terpadu Ekosistem Warga";

    // 4. Group Username
    const userGroup = document.createElement("div");
    userGroup.className = "input-group";
    const userLabel = document.createElement("label");
    userLabel.className = "login-label";
    userLabel.textContent = "Username";
    const userInput = document.createElement("input");
    userInput.type = "text";
    userInput.id = "inputUsername";
    userInput.className = "login-input";
    userInput.placeholder = "Masukkan username";

    userGroup.appendChild(userLabel);
    userGroup.appendChild(userInput);

    // 5. Group Password
    const passGroup = document.createElement("div");
    passGroup.className = "input-group";
    const passLabel = document.createElement("label");
    passLabel.className = "login-label";
    passLabel.textContent = "Password";
    const passInput = document.createElement("input");
    passInput.type = "password";
    passInput.id = "inputPassword";
    passInput.className = "login-input";
    passInput.placeholder = "••••••••";

    passGroup.appendChild(passLabel);
    passGroup.appendChild(passInput);

    // 6. Area Error & Tombol Login
    const errorMsg = document.createElement("div");
    errorMsg.className = "error-msg";

    const loginBtn = document.createElement("button");
    loginBtn.className = "login-btn";
    loginBtn.textContent = "Masuk ke Sistem";

    // 7. Logika Eksekusi Login
    loginBtn.addEventListener("click", () => {
      const username = document.getElementById("inputUsername").value.trim();
      const password = document.getElementById("inputPassword").value.trim();

      if (!username || !password) {
        errorMsg.textContent = "Username dan password wajib diisi.";
        return;
      }

      loginBtn.textContent = "Memverifikasi...";
      loginBtn.disabled = true;
      errorMsg.textContent = "";

      google.script.run
        .withSuccessHandler((userData) => {
          UI_STATE.user = userData;
          renderAppLayout();
        })
        .withFailureHandler((error) => {
          errorMsg.textContent = error.message;
          loginBtn.textContent = "Masuk ke Sistem";
          loginBtn.disabled = false;
        })
        .authenticateUser(username, password);
    });

    // 8. Susun Panel & Eksekusi ke DOM
    panel.appendChild(logoContainer);
    panel.appendChild(logoText);
    panel.appendChild(tagline);
    panel.appendChild(userGroup);
    panel.appendChild(passGroup);
    panel.appendChild(loginBtn);
    panel.appendChild(errorMsg);

    wrapper.appendChild(panel);
    appRoot.appendChild(wrapper);
  }

  // 5. BOOTING ENGINE MENGGUNAKAN TRY-CATCH
  // UBAH BAGIAN INI:
  try {
    // Ganti renderAppLayout() menjadi renderLoginScreen()
    renderLoginScreen();
  } catch (error) {
    console.error("DOM Engine Crash:", error);
    const root = document.getElementById("app-root");
    if (root) {
      root.textContent = "CRASH DETECTED: " + error.message;
    }
  }
</script>
