<style>
  /* ========================================== S.I.W.A.R.G.A - GLOBAL DESIGN SYSTEM Premium, Responsive, dan Fluid UI ========================================== */ /* 1. CSS VARIABLES (Tema Mahal & Animasi Mulus) */
  :root {
    --primary: #2563eb; /* Biru Profesional (Primary) */
    --primary-hover: #1d4ed8;
    --bg-body: #f8fafc; /* Abu-abu sangat terang untuk latar */
    --bg-sidebar: #ffffff; /* Putih bersih untuk elemen mengambang */
    --text-main: #0f172a; /* Hitam elegan untuk
teks bacaan */
    --text-muted: #64748b; /* Abu-abu untuk teks sekunder/ikon */
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); /*
Dimensi & Animasi */
    --sidebar-width: 260px;
    --header-height: 65px;
    --transition-speed: 0.3s;
    --transition-curve: cubic-bezier(0.4, 0, 0.2, 1); /* Efek Fluid/Mulus */
  } /* 2. RESET & TYPOGRAPHY STANDAR */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family:
      "Inter",
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Helvetica,
      Arial,
      sans-serif;
  }
  body {
    background-color: var(--bg-body);
    color: var(--text-main);
    overflow-x: hidden; /* Cegah scroll
horizontal tidak sengaja */
  } /* 3. LAYOUT ROOT ENGINE */
  #app-root {
    display: flex;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  } /* 4. SIDEBAR BASE (Persiapan Collapsible) */
  .sidebar {
    width: var(--sidebar-width);
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    transition:
      transform var(--transition-speed) var(--transition-curve),
      width var(--transition-speed) var(--transition-curve);
    display: flex;
    flex-direction: column;
    z-index: 50;
  } /* 5. MAIN CONTENT BASE */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    transition: margin-left var(--transition-speed) var(--transition-curve);
    overflow-y: auto;
    position: relative;
  } /* 6. RESPONSIVE ENGINE (Aturan Mobile-Friendly) */
  @media (max-width: 768px) {
    /* Sembunyikan sidebar ke kiri luar layar secara default di HP */
    .sidebar {
      position: fixed;
      height: 100%;
      transform: translateX(-100%);
      box-shadow: var(--shadow-md);
    } /* Class ini akan ditambahkan oleh JS saat tombol menu ditekan */
    .sidebar.active {
      transform: translateX(0);
    }
    .main-content {
      width: 100%;
    } /* Latar belakang gelap (Overlay) saat sidebar terbuka di HP */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.5); /* Warna text-main dengan opacity */
      backdrop-filter: blur(2px); /* Kesan Mahal/Premium */
      z-index: 40;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity var(--transition-speed) var(--transition-curve),
        visibility var(--transition-speed) var(--transition-curve);
    }
    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }
  }

  /* 7. GLASSMORPHISM & PARTICLE UI (The Billion-Dollar Aesthetic) */
  .login-wrapper {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: #0f172a; /* Deep Space Navy */
  }

  /* Partikel Melayang (Pure CSS) */
  .particle-blob {
    position: absolute;
    filter: blur(90px);
    z-index: 1;
    opacity: 0.5;
    animation: floatParticle 12s infinite ease-in-out alternate;
  }
  .blob-1 {
    width: 500px;
    height: 500px;
    background: #3b82f6; /* Blue Glow */
    top: -150px;
    left: -150px;
  }
  .blob-2 {
    width: 400px;
    height: 400px;
    background: #8b5cf6; /* Purple Glow */
    bottom: -100px;
    right: -100px;
    animation-delay: -6s;
  }

  @keyframes floatParticle {
    0% {
      transform: translateY(0) scale(1);
    }
    100% {
      transform: translateY(50px) scale(1.1);
    }
  }

  /* Glass Card */
  .login-panel {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 460px;
    padding: 3rem;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    box-shadow:
      0 30px 60px -15px rgba(0, 0, 0, 0.8),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
    margin: 20px;
  }

  /* Logo Setup */
  .logo-container {
    display: flex;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .logo-container svg {
    width: 70px;
    height: 70px;
    filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.5));
  }

  .login-title {
    font-size: 2rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 0.5rem;
    background: linear-gradient(to right, #60a5fa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }
  .login-subtitle {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 2.5rem;
    font-size: 0.95rem;
  }

  .login-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #cbd5e1;
    margin-bottom: 0.5rem;
    letter-spacing: 0.5px;
  }

  .login-input {
    width: 100%;
    padding: 1rem 1.25rem;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: white;
    font-size: 1rem;
    transition: all 0.3s ease;
    margin-bottom: 1.5rem;
  }
  .login-input:focus {
    outline: none;
    border-color: #60a5fa;
    background: rgba(15, 23, 42, 0.9);
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
  }
  .login-input::placeholder {
    color: #475569;
  }

  .login-btn {
    width: 100%;
    padding: 1.1rem;
    background: linear-gradient(135deg, #2563eb 0%, #6d28d9 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.5);
    letter-spacing: 1px;
  }
  .login-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px -5px rgba(59, 130, 246, 0.7);
  }
  .login-btn:active {
    transform: translateY(0);
  }

  /* Responsif Mobile Khusus Glassmorphism */
  @media (max-width: 600px) {
    .login-panel {
      padding: 2.5rem 1.5rem;
    }
    .login-title {
      font-size: 1.7rem;
    }
  }
</style>
