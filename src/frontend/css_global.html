<style>
  /* ========================================== S.I.W.A.R.G.A - GLOBAL DESIGN SYSTEM Premium, Responsive, dan Fluid UI ========================================== */ /* 1. CSS VARIABLES (Tema Mahal & Animasi Mulus) */
  :root {
    --primary: #2563eb; /* Biru Profesional (Primary) */
    --primary-hover: #1d4ed8;
    --bg-body: #f8fafc; /* Abu-abu sangat terang untuk latar */
    --bg-sidebar: #ffffff; /* Putih bersih untuk elemen mengambang */
    --text-main: #0f172a; /* Hitam elegan untuk
teks bacaan */
    --text-muted: #64748b; /* Abu-abu untuk teks sekunder/ikon */
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); /*
Dimensi & Animasi */
    --sidebar-width: 260px;
    --header-height: 65px;
    --transition-speed: 0.3s;
    --transition-curve: cubic-bezier(0.4, 0, 0.2, 1); /* Efek Fluid/Mulus */
  } /* 2. RESET & TYPOGRAPHY STANDAR */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family:
      "Inter",
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Helvetica,
      Arial,
      sans-serif;
  }
  body {
    background-color: var(--bg-body);
    color: var(--text-main);
    overflow-x: hidden; /* Cegah scroll
horizontal tidak sengaja */
  } /* 3. LAYOUT ROOT ENGINE */
  #app-root {
    display: flex;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  } /* 4. SIDEBAR BASE (Persiapan Collapsible) */
  .sidebar {
    width: var(--sidebar-width);
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    transition:
      transform var(--transition-speed) var(--transition-curve),
      width var(--transition-speed) var(--transition-curve);
    display: flex;
    flex-direction: column;
    z-index: 50;
  } /* 5. MAIN CONTENT BASE */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    transition: margin-left var(--transition-speed) var(--transition-curve);
    overflow-y: auto;
    position: relative;
  } /* 6. RESPONSIVE ENGINE (Aturan Mobile-Friendly) */
  @media (max-width: 768px) {
    /* Sembunyikan sidebar ke kiri luar layar secara default di HP */
    .sidebar {
      position: fixed;
      height: 100%;
      transform: translateX(-100%);
      box-shadow: var(--shadow-md);
    } /* Class ini akan ditambahkan oleh JS saat tombol menu ditekan */
    .sidebar.active {
      transform: translateX(0);
    }
    .main-content {
      width: 100%;
    } /* Latar belakang gelap (Overlay) saat sidebar terbuka di HP */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.5); /* Warna text-main dengan opacity */
      backdrop-filter: blur(2px); /* Kesan Mahal/Premium */
      z-index: 40;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity var(--transition-speed) var(--transition-curve),
        visibility var(--transition-speed) var(--transition-curve);
    }
    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }
  }

  /* 7. MODERN CORPORATE LOGIN UI WITH EFFECTS */
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    width: 100vw;
    background-color: #f8fafc;
    position: relative;
    /* PERBAIKAN MOBILE: Izinkan scroll jika konten melebihi tinggi layar */
    overflow-y: auto;
    overflow-x: hidden;
    /* PERBAIKAN MOBILE: Padding agar panel tidak menabrak pinggir layar atas/bawah */
    padding: 2rem 1rem;
  }

  /* Partikel Korporat (Efek Visual Bergerak Halus) */
  .corp-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 1;
    opacity: 0.4;
    animation: floatBlob 15s infinite ease-in-out alternate;
  }
  .blob-primary {
    width: 450px;
    height: 450px;
    background-color: #3b82f6; /* Biru Profesional */
    top: -100px;
    left: -100px;
  }
  .blob-secondary {
    width: 350px;
    height: 350px;
    background-color: #0ea5e9; /* Biru Langit */
    bottom: -50px;
    right: -50px;
    animation-delay: -7s;
  }

  @keyframes floatBlob {
    0% {
      transform: translate(0, 0) scale(1);
    }
    100% {
      transform: translate(40px, 60px) scale(1.1);
    }
  }

  /* Kartu Login (Kaca Premium) */
  .login-panel {
    position: relative;
    z-index: 10; /* Berada di atas partikel */
    background: rgba(255, 255, 255, 0.85); /* Sedikit tembus pandang */
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 3rem 2.5rem;
    border-radius: 16px;
    box-shadow:
      0 20px 40px -10px rgba(0, 0, 0, 0.1),
      0 0 15px rgba(0, 0, 0, 0.02);
    width: 100%;
    max-width: 420px;
    border: 1px solid rgba(255, 255, 255, 0.6);
    margin: auto;
  }

  /* Identitas Visual */
  .login-logo-container {
    display: flex;
    justify-content: center;
    margin-bottom: 0.75rem;
  }

  .login-logo-text {
    text-align: center;
    font-size: 1.75rem;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.5px;
    margin-bottom: 0.25rem;
  }

  .login-tagline {
    text-align: center;
    font-size: 0.9rem;
    color: #64748b;
    line-height: 1.4;
    font-weight: 500;
    margin-bottom: 2rem;
    padding: 0 1rem;
  }

  /* Form Input */
  .input-group {
    margin-bottom: 1.25rem;
  }

  .login-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: #334155;
    margin-bottom: 0.5rem;
  }

  .login-input {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 1rem;
    color: #0f172a;
    background-color: #ffffff;
    transition: all 0.3s ease;
  }

  .login-input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
  }

  .login-btn {
    width: 100%;
    padding: 0.85rem;
    background-color: #0f172a; /* Biru Gelap / Navy */
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 0.5rem;
  }

  .login-btn:hover {
    background-color: #1e293b;
    transform: translateY(-2px);
    box-shadow: 0 8px 15px -3px rgba(15, 23, 42, 0.2);
  }

  .login-btn:disabled {
    background-color: #94a3b8;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .error-msg {
    color: #dc2626;
    font-size: 0.875rem;
    text-align: center;
    margin-top: 1rem;
    min-height: 20px;
  }

  /* Penyesuaian Mobile Khusus */
  @media (max-width: 480px) {
    .login-panel {
      padding: 2rem 1.5rem;
    }
    .login-logo-text {
      font-size: 1.5rem;
    }
  }

  /* 8. PREMIUM DASHBOARD & COLLAPSIBLE SIDEBAR UI */
  :root {
    --sidebar-width: 260px;
    --sidebar-collapsed-width: 84px;
  }

  .sidebar {
    width: var(--sidebar-width);
    background-color: #ffffff;
    border-right: 1px solid #e2e8f0;
    box-shadow: 4px 0 24px rgba(0, 0, 0, 0.02);
    display: flex;
    flex-direction: column;
    transition:
      width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
      transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 50;
    overflow: hidden; /* Mencegah teks meluber saat ditarik */
  }

  /* State ketika Sidebar di-Minimize (Desktop) */
  .sidebar.collapsed {
    width: var(--sidebar-collapsed-width);
  }

  .sidebar-header {
    height: 70px;
    padding: 0 1.5rem;
    border-bottom: 1px solid #f8fafc;
    display: flex;
    align-items: center;
    justify-content: space-between;
    white-space: nowrap;
  }

  .sidebar-title-container {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-title-icon {
    color: var(--primary);
    display: flex;
    align-items: center;
  }

  .sidebar-title-text {
    font-weight: 800;
    font-size: 1.25rem;
    color: #0f172a;
    letter-spacing: -0.5px;
    transition:
      opacity 0.2s ease,
      width 0.2s ease;
  }

  /* Sembunyikan teks judul saat collapse */
  .sidebar.collapsed .sidebar-title-text {
    opacity: 0;
    width: 0;
    display: none;
  }

  .btn-collapse {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    border-radius: 6px;
    transition: all 0.2s ease;
  }

  .btn-collapse:hover {
    background-color: #f1f5f9;
    color: #0f172a;
  }

  /* Sembunyikan tombol collapse di HP (Karena HP pakai sistem overlay) */
  @media (max-width: 768px) {
    .btn-collapse {
      display: none;
    }
  }

  .menu-container {
    flex: 1;
    padding: 1.5rem 0;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  .menu-item {
    display: flex;
    align-items: center;
    padding: 0.85rem 1.5rem;
    margin: 0.25rem 1rem;
    border-radius: 8px;
    color: #64748b;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    position: relative;
  }

  .menu-item:hover {
    background-color: #f8fafc;
    color: #0f172a;
  }

  /* Gaya Aktif yang Mewah (Pita Biru di Kiri) */
  .menu-item.active {
    background-color: #eff6ff;
    color: #2563eb;
  }
  .menu-item.active::before {
    content: "";
    position: absolute;
    left: -1rem;
    top: 10%;
    height: 80%;
    width: 4px;
    background-color: #2563eb;
    border-radius: 0 4px 4px 0;
  }

  .menu-item-icon {
    margin-right: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .menu-item-text {
    transition: opacity 0.2s ease;
  }

  /* Menyesuaikan menu saat Sidebar Collapsed */
  .sidebar.collapsed .menu-item {
    padding: 0.85rem 0;
    justify-content: center;
  }
  .sidebar.collapsed .menu-item-icon {
    margin-right: 0;
  }
  .sidebar.collapsed .menu-item-text {
    opacity: 0;
    width: 0;
    display: none;
  }
  .sidebar.collapsed .menu-item.active::before {
    left: 0; /* Geser pita biru aktif agar tetap terlihat saat diringkas */
  }

  .menu-logout {
    margin-top: auto;
    color: #ef4444;
  }

  .menu-logout:hover {
    background-color: #fef2f2;
    color: #dc2626;
  }

  /* Navbar Profile UI */
  .topbar-profile {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .profile-info {
    text-align: right;
    line-height: 1.2;
  }
  .profile-name {
    font-weight: 700;
    font-size: 0.9rem;
    color: #0f172a;
  }
  .profile-role {
    font-size: 0.7rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }

  .profile-avatar {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 1.1rem;
    box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2);
  }

  @media (max-width: 600px) {
    .profile-info {
      display: none;
    }
  }
</style>
