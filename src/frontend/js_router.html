<script>
  /**
   * ==========================================
   * S.I.W.A.R.G.A - ZERO-LATENCY ROUTER ENGINE
   * Modul Data Penduduk dengan CRUD & Live Filter
   * ==========================================
   */

  function switchPage(pageId) {
    const pageContainer = document.getElementById("pageContainer");
    if (!pageContainer) return;

    pageContainer.textContent = "";
    document.querySelectorAll(".menu-item").forEach((item) => item.classList.remove("active"));

    const activeMenu = document.getElementById("menu-" + pageId);
    if (activeMenu) activeMenu.classList.add("active");

    switch (pageId) {
      case "dashboard":
        renderViewDashboard(pageContainer);
        break;
      case "data":
        renderViewDataPenduduk(pageContainer);
        break;
      default:
        renderViewPlaceholder(pageContainer, "Modul Sedang Dirakit", "Silakan akses menu Data Penduduk untuk menguji fitur CRUD & Filter.");
    }
  }

  function renderViewDashboard(container) {
    const title = document.createElement("h2");
    title.textContent = "Dashboard Utama";
    title.style.color = "#0f172a";
    title.style.marginBottom = "20px";
    container.appendChild(title);
  }

  /**
   * ==========================================
   * VIEW: DATA PENDUDUK (FULL CRUD)
   * ==========================================
   */
  function renderViewDataPenduduk(container) {
    const headerDiv = document.createElement("div");
    headerDiv.style.display = "flex";
    headerDiv.style.justifyContent = "space-between";
    headerDiv.style.alignItems = "center";
    headerDiv.style.marginBottom = "1.5rem";

    const title = document.createElement("h2");
    title.textContent = "Buku Induk Penduduk";
    title.style.color = "#0f172a";

    const btnAdd = document.createElement("button");
    btnAdd.className = "btn-primary";
    btnAdd.textContent = "+ Tambah Warga";
    btnAdd.onclick = () => openWargaModal("ADD", null, tableContainer);

    headerDiv.appendChild(title);
    headerDiv.appendChild(btnAdd);
    container.appendChild(headerDiv);

    const tableContainer = document.createElement("div");
    tableContainer.id = "tableContainerWarga";
    container.appendChild(tableContainer);

    loadWargaTable(tableContainer);
  }

  // FUNGSI MEMUAT TABEL & MESIN FILTER
  function loadWargaTable(container) {
    container.innerHTML = '<div class="loading-text">Menyinkronkan data dengan database...</div>';

    google.script.run
      .withSuccessHandler((dataWarga) => {
        container.innerHTML = ""; // Bersihkan loading

        // 1. RAKIT TOOLBAR FILTER & SEARCH
        const toolbar = document.createElement("div");
        toolbar.className = "table-toolbar";

        const searchInput = document.createElement("input");
        searchInput.type = "text";
        searchInput.className = "form-control toolbar-search";
        searchInput.placeholder = "Cari Nama, Username, Blok, atau Jabatan...";

        const filterRole = document.createElement("select");
        filterRole.className = "form-control toolbar-filter";
        filterRole.innerHTML = `
        <option value="ALL">Semua Hak Akses</option>
        <option value="SUPER_ADMIN">Super Admin</option>
        <option value="KETUA_RT">Ketua RT</option>
        <option value="PENGURUS">Pengurus</option>
        <option value="KORLAP_GANG">Korlap Gang</option>
        <option value="WARGA">Warga</option>
      `;

        const filterStatus = document.createElement("select");
        filterStatus.className = "form-control toolbar-filter";
        filterStatus.innerHTML = `
        <option value="ALL">Semua Status</option>
        <option value="AKTIF">Aktif</option>
        <option value="NON-AKTIF">Non-Aktif</option>
      `;

        toolbar.appendChild(searchInput);
        toolbar.appendChild(filterRole);
        toolbar.appendChild(filterStatus);
        container.appendChild(toolbar);

        // 2. RAKIT KERANGKA TABEL
        const wrap = document.createElement("div");
        wrap.className = "table-container";
        const scroll = document.createElement("div");
        scroll.className = "table-wrapper";
        const table = document.createElement("table");
        table.className = "enterprise-table";

        const thead = document.createElement("thead");
        const trHead = document.createElement("tr");
        ["USERNAME", "NAMA", "BLOK", "JABATAN", "ROLE", "STATUS", "AKSI"].forEach((teks) => {
          const th = document.createElement("th");
          th.textContent = teks;
          trHead.appendChild(th);
        });
        thead.appendChild(trHead);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        table.appendChild(tbody);
        scroll.appendChild(table);
        wrap.appendChild(scroll);
        container.appendChild(wrap);

        // 3. FUNGSI RENDER BARIS (Dapat dipanggil berulang kali secara instan)
        function renderRows(data) {
          tbody.innerHTML = ""; // Bersihkan baris lama

          if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 2rem; color: #64748b;">Tidak ada data yang cocok dengan kriteria pencarian.</td></tr>';
            return;
          }

          data.forEach((warga) => {
            const tr = document.createElement("tr");

            const tdUser = document.createElement("td");
            tdUser.textContent = warga.USERNAME;
            tdUser.style.color = "#64748b";
            tr.appendChild(tdUser);
            const tdNama = document.createElement("td");
            tdNama.textContent = warga.NAMA;
            tdNama.style.fontWeight = "700";
            tr.appendChild(tdNama);
            const tdBlok = document.createElement("td");
            tdBlok.textContent = warga.BLOK_RUMAH;
            tr.appendChild(tdBlok);
            const tdJabatan = document.createElement("td");
            tdJabatan.textContent = warga.JABATAN;
            tr.appendChild(tdJabatan);

            const tdRole = document.createElement("td");
            const badgeRole = document.createElement("span");
            badgeRole.className = "badge";
            badgeRole.textContent = warga.ROLE;
            if (["SUPER_ADMIN", "KETUA_RT"].includes(warga.ROLE)) badgeRole.classList.add("badge-admin");
            else if (["PENGURUS", "KORLAP_GANG"].includes(warga.ROLE)) badgeRole.classList.add("badge-pengurus");
            else badgeRole.classList.add("badge-warga");
            tdRole.appendChild(badgeRole);
            tr.appendChild(tdRole);

            const tdStatus = document.createElement("td");
            const badgeStatus = document.createElement("span");
            badgeStatus.className = warga.STATUS === "AKTIF" ? "badge badge-aktif" : "badge badge-admin";
            badgeStatus.textContent = warga.STATUS;
            tdStatus.appendChild(badgeStatus);
            tr.appendChild(tdStatus);

            const tdAksi = document.createElement("td");
            const btnEdit = document.createElement("button");
            btnEdit.className = "btn-edit";
            btnEdit.textContent = "Edit";
            btnEdit.onclick = () => openWargaModal("EDIT", warga, container);

            const btnDel = document.createElement("button");
            btnDel.className = "btn-danger";
            btnDel.textContent = "Hapus";
            btnDel.onclick = () => confirmDeleteWarga(warga.USERNAME, warga.NAMA, container);

            tdAksi.appendChild(btnEdit);
            tdAksi.appendChild(btnDel);
            tr.appendChild(tdAksi);
            tbody.appendChild(tr);
          });
        }

        // 4. LOGIKA FILTER REAL-TIME
        function applyFilters() {
          const keyword = searchInput.value.toLowerCase();
          const selRole = filterRole.value;
          const selStatus = filterStatus.value;

          const filteredData = dataWarga.filter((warga) => {
            // Cek Pencarian Teks (Cari di Nama, Username, Blok, atau Jabatan)
            const textMatch = warga.NAMA.toLowerCase().includes(keyword) || warga.USERNAME.toLowerCase().includes(keyword) || warga.BLOK_RUMAH.toLowerCase().includes(keyword) || warga.JABATAN.toLowerCase().includes(keyword);

            // Cek Dropdown Role
            const roleMatch = selRole === "ALL" || warga.ROLE === selRole;

            // Cek Dropdown Status
            const statusMatch = selStatus === "ALL" || warga.STATUS === selStatus;

            return textMatch && roleMatch && statusMatch;
          });

          renderRows(filteredData);
        }

        // 5. PASANG EVENT LISTENER TRIGGER
        searchInput.addEventListener("input", applyFilters);
        filterRole.addEventListener("change", applyFilters);
        filterStatus.addEventListener("change", applyFilters);

        // Eksekusi Render Pertama Kali
        renderRows(dataWarga);
      })
      .withFailureHandler((error) => {
        container.innerHTML = `<div class="loading-text" style="color:red;">Error: ${error.message}</div>`;
      })
      .getAllWarga();
  }

  /**
   * ==========================================
   * MESIN MODAL FORMULAR & DELETE (DOM MURNI)
   * ==========================================
   */
  function openWargaModal(mode, data = null, tableContainer) {
    const oldModal = document.getElementById("crudModal");
    if (oldModal) oldModal.remove();

    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.id = "crudModal";

    const box = document.createElement("div");
    box.className = "modal-box";

    const header = document.createElement("div");
    header.className = "modal-header";
    header.textContent = mode === "ADD" ? "Form Tambah Penduduk" : "Edit Data Penduduk";

    const btnClose = document.createElement("button");
    btnClose.innerHTML = "&times;";
    btnClose.style.background = "none";
    btnClose.style.border = "none";
    btnClose.style.fontSize = "1.5rem";
    btnClose.style.cursor = "pointer";
    btnClose.onclick = () => overlay.remove();
    header.appendChild(btnClose);

    const body = document.createElement("div");
    body.className = "modal-body";

    function createInput(labelTxt, id, val, type = "text", isReadonly = false) {
      const grp = document.createElement("div");
      grp.className = "form-group";
      const lbl = document.createElement("label");
      lbl.textContent = labelTxt;
      const inp = document.createElement("input");
      inp.className = "form-control";
      inp.type = type;
      inp.id = "mod_" + id;
      inp.value = val || "";
      if (isReadonly) {
        inp.readOnly = true;
        inp.style.backgroundColor = "#f1f5f9";
      }
      grp.appendChild(lbl);
      grp.appendChild(inp);
      body.appendChild(grp);
    }

    function createSelect(labelTxt, id, val, optionsArr) {
      const grp = document.createElement("div");
      grp.className = "form-group";
      const lbl = document.createElement("label");
      lbl.textContent = labelTxt;
      const sel = document.createElement("select");
      sel.className = "form-control";
      sel.id = "mod_" + id;
      optionsArr.forEach((opt) => {
        const o = document.createElement("option");
        o.value = opt;
        o.textContent = opt;
        if (val === opt) o.selected = true;
        sel.appendChild(o);
      });
      grp.appendChild(lbl);
      grp.appendChild(sel);
      body.appendChild(grp);
    }

    createInput("Username (Unik)", "username", data ? data.USERNAME : "", "text", mode === "EDIT");
    createInput("Nama Lengkap", "nama", data ? data.NAMA : "");
    createInput("Password", "password", data ? data.PASSWORD : "warga123");
    createInput("Nomor / Blok Rumah", "blok", data ? data.BLOK_RUMAH : "");
    createInput("Jabatan", "jabatan", data ? data.JABATAN : "Warga");
    createSelect("Hak Akses (Role)", "role", data ? data.ROLE : "WARGA", ["SUPER_ADMIN", "KETUA_RT", "PENGURUS", "KORLAP_GANG", "WARGA"]);
    createSelect("Status", "status", data ? data.STATUS : "AKTIF", ["AKTIF", "NON-AKTIF"]);

    const errorText = document.createElement("div");
    errorText.style.color = "#ef4444";
    errorText.style.fontSize = "0.85rem";
    errorText.style.marginTop = "10px";
    body.appendChild(errorText);

    const footer = document.createElement("div");
    footer.className = "modal-footer";

    const btnBatal = document.createElement("button");
    btnBatal.className = "btn-secondary";
    btnBatal.textContent = "Batal";
    btnBatal.onclick = () => overlay.remove();

    const btnSimpan = document.createElement("button");
    btnSimpan.className = "btn-primary";
    btnSimpan.textContent = "Simpan Data";

    btnSimpan.onclick = () => {
      const payload = {
        USERNAME: document.getElementById("mod_username").value.trim(),
        NAMA: document.getElementById("mod_nama").value.trim(),
        PASSWORD: document.getElementById("mod_password").value.trim(),
        BLOK_RUMAH: document.getElementById("mod_blok").value.trim(),
        JABATAN: document.getElementById("mod_jabatan").value.trim(),
        ROLE: document.getElementById("mod_role").value,
        STATUS: document.getElementById("mod_status").value,
      };

      if (!payload.USERNAME || !payload.NAMA) {
        errorText.textContent = "Username dan Nama wajib diisi.";
        return;
      }

      btnSimpan.textContent = "Menyimpan...";
      btnSimpan.disabled = true;
      errorText.textContent = "";

      if (mode === "ADD") {
        google.script.run
          .withSuccessHandler(() => {
            overlay.remove();
            loadWargaTable(tableContainer);
          })
          .withFailureHandler((err) => {
            btnSimpan.textContent = "Simpan Data";
            btnSimpan.disabled = false;
            errorText.textContent = err.message;
          })
          .createWarga(payload);
      } else {
        google.script.run
          .withSuccessHandler(() => {
            overlay.remove();
            loadWargaTable(tableContainer);
          })
          .withFailureHandler((err) => {
            btnSimpan.textContent = "Simpan Data";
            btnSimpan.disabled = false;
            errorText.textContent = err.message;
          })
          .updateWarga(data.USERNAME, payload);
      }
    };

    footer.appendChild(btnBatal);
    footer.appendChild(btnSimpan);
    box.appendChild(header);
    box.appendChild(body);
    box.appendChild(footer);
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    setTimeout(() => overlay.classList.add("show"), 10);
  }

  function confirmDeleteWarga(username, nama, tableContainer) {
    if (confirm(`PENGHAPUSAN PERMANEN\nApakah Anda yakin ingin menghapus warga [${nama}] dengan username "${username}"?`)) {
      tableContainer.innerHTML = '<div class="loading-text">Menghapus data dari server...</div>';
      google.script.run
        .withSuccessHandler((msg) => {
          alert(msg);
          loadWargaTable(tableContainer);
        })
        .withFailureHandler((err) => {
          alert("Gagal menghapus: " + err.message);
          loadWargaTable(tableContainer);
        })
        .deleteWarga(username);
    }
  }

  function renderViewPlaceholder(container, titleText, descText) {
    const title = document.createElement("h2");
    title.textContent = titleText;
    title.style.color = "#0f172a";
    title.style.marginBottom = "10px";
    const text = document.createElement("p");
    text.textContent = descText;
    text.style.color = "#64748b";
    text.style.padding = "20px";
    text.style.background = "#f8fafc";
    text.style.borderLeft = "4px solid #f59e0b";
    container.appendChild(title);
    container.appendChild(text);
  }
</script>
