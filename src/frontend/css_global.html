<style>
  /* ========================================== S.I.W.A.R.G.A - GLOBAL DESIGN SYSTEM Premium, Responsive, dan Fluid UI ========================================== */ /* 1. CSS VARIABLES (Tema Mahal & Animasi Mulus) */
  :root {
    --primary: #2563eb; /* Biru Profesional (Primary) */
    --primary-hover: #1d4ed8;
    --bg-body: #f8fafc; /* Abu-abu sangat terang untuk latar */
    --bg-sidebar: #ffffff; /* Putih bersih untuk elemen mengambang */
    --text-main: #0f172a; /* Hitam elegan untuk
teks bacaan */
    --text-muted: #64748b; /* Abu-abu untuk teks sekunder/ikon */
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); /*
Dimensi & Animasi */
    --sidebar-width: 260px;
    --header-height: 65px;
    --transition-speed: 0.3s;
    --transition-curve: cubic-bezier(0.4, 0, 0.2, 1); /* Efek Fluid/Mulus */
  } /* 2. RESET & TYPOGRAPHY STANDAR */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family:
      "Inter",
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Helvetica,
      Arial,
      sans-serif;
  }
  body {
    background-color: var(--bg-body);
    color: var(--text-main);
    overflow-x: hidden; /* Cegah scroll
horizontal tidak sengaja */
  } /* 3. LAYOUT ROOT ENGINE */
  #app-root {
    display: flex;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  } /* 4. SIDEBAR BASE (Persiapan Collapsible) */
  .sidebar {
    width: var(--sidebar-width);
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    transition:
      transform var(--transition-speed) var(--transition-curve),
      width var(--transition-speed) var(--transition-curve);
    display: flex;
    flex-direction: column;
    z-index: 50;
  } /* 5. MAIN CONTENT BASE */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    transition: margin-left var(--transition-speed) var(--transition-curve);
    overflow-y: auto;
    position: relative;
  } /* 6. RESPONSIVE ENGINE (Aturan Mobile-Friendly) */
  @media (max-width: 768px) {
    /* Sembunyikan sidebar ke kiri luar layar secara default di HP */
    .sidebar {
      position: fixed;
      height: 100%;
      transform: translateX(-100%);
      box-shadow: var(--shadow-md);
    } /* Class ini akan ditambahkan oleh JS saat tombol menu ditekan */
    .sidebar.active {
      transform: translateX(0);
    }
    .main-content {
      width: 100%;
    } /* Latar belakang gelap (Overlay) saat sidebar terbuka di HP */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.5); /* Warna text-main dengan opacity */
      backdrop-filter: blur(2px); /* Kesan Mahal/Premium */
      z-index: 40;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity var(--transition-speed) var(--transition-curve),
        visibility var(--transition-speed) var(--transition-curve);
    }
    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }
  }

  /* 7. PREMIUM LOGIN UI (Enterprise Standard) */
/* 7. ULTRA-PREMIUM LOGIN UI (Split-Screen Enterprise) */
.login-wrapper {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  background-color: #ffffff;
}

/* Panel Kiri (Banner Eksklusif) */
.login-banner {
  flex: 1;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 5rem 10%;
  color: white;
  position: relative;
  overflow: hidden;
}

/* Efek Watermark/Cahaya Halus di Banner */
.login-banner::after {
  content: '';
  position: absolute;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 70%);
  border-radius: 50%;
  top: -200px;
  right: -200px;
  pointer-events: none;
}

.banner-title {
  font-size: 3.5rem;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 1rem;
  z-index: 2;
}

.banner-subtitle {
  font-size: 1.25rem;
  color: #94a3b8;
  line-height: 1.6;
  max-width: 450px;
  z-index: 2;
}

/* Panel Kanan (Form Eksekusi) */
.login-panel {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 4rem;
  background: #ffffff;
  box-shadow: -15px 0 30px rgba(0, 0, 0, 0.03);
  z-index: 10;
}

.login-title {
  font-size: 2rem;
  font-weight: 800;
  color: #0f172a;
  margin-bottom: 0.5rem;
  letter-spacing: -0.5px;
}

.login-subtitle {
  color: #64748b;
  font-size: 1rem;
  margin-bottom: 2.5rem;
}

.input-group {
  margin-bottom: 1.5rem;
}

.login-label {
  display: block;
  font-size: 0.875rem;
  font-weight: 600;
  color: #334155;
  margin-bottom: 0.5rem;
}

.login-input {
  width: 100%;
  padding: 1rem 1.25rem;
  border: 1px solid #cbd5e1;
  border-radius: 8px; /* Lebih tegas, tidak terlalu membulat */
  font-size: 1rem;
  color: #0f172a;
  transition: all 0.3s ease;
  background-color: #f8fafc;
}

.login-input:focus {
  outline: none;
  border-color: #0f172a;
  background-color: #ffffff;
  box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.1);
}

.login-btn {
  width: 100%;
  padding: 1.1rem;
  background-color: #0f172a;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 1rem;
  letter-spacing: 0.5px;
}

.login-btn:hover {
  background-color: #1e293b;
  transform: translateY(-2px);
  box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.3);
}

.login-btn:disabled {
  background-color: #94a3b8;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* Responsif: Menghilangkan Banner Kiri di Layar HP */
@media (max-width: 900px) {
  .login-banner {
    display: none;
  }
  .login-panel {
    max-width: 100%;
    padding: 2.5rem;
    box-shadow: none;
  }
}
</style>
