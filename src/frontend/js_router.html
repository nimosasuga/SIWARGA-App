<script>
  /**
   * ==========================================
   * S.I.W.A.R.G.A - ZERO-LATENCY ROUTER ENGINE
   * STATUS: PRODUCTION STABLE
   * Modul Aktif: Dashboard, Data Penduduk, Keuangan (Dynamic Filter)
   * ==========================================
   */

  function switchPage(pageId) {
    const pageContainer = document.getElementById("pageContainer");
    if (!pageContainer) return;
    pageContainer.textContent = "";
    document.querySelectorAll(".menu-item").forEach((item) => item.classList.remove("active"));
    const activeMenu = document.getElementById("menu-" + pageId);
    if (activeMenu) activeMenu.classList.add("active");

    switch (pageId) {
      case "dashboard":
        renderViewDashboard(pageContainer);
        break;
      case "warga": // RUTE BARU AKTIF
        renderViewManajemenWarga(pageContainer);
        break;
      case "data":
        renderViewDataPenduduk(pageContainer);
        break;
      case "keuangan":
        renderViewKeuangan(pageContainer);
        break;
      case "iuran":
        renderViewIuranSaya(pageContainer);
        break;
      case "profil": // RUTE BARU DIDAFTARKAN
        renderViewProfil(pageContainer);
        break;
      default:
        renderViewPlaceholder(pageContainer, "Modul Sedang Dirakit", "Modul ini sedang dalam tahap pengembangan iterasi berikutnya.");
    }
  }

  /**
   * VIEW: Modul Dashboard Utama (Analitik Real-Time)
   */
  function renderViewDashboard(container) {
    // 1. Header & Welcome Banner
    const headerDiv = document.createElement("div");
    headerDiv.style.marginBottom = "20px";

    const title = document.createElement("h2");
    title.textContent = "Ringkasan Eksekutif";
    title.style.color = "#0f172a";
    title.style.marginBottom = "5px";

    const subtitle = document.createElement("p");
    subtitle.textContent = "Memuat analitik sistem terenkripsi...";
    subtitle.style.color = "#64748b";
    subtitle.id = "dash-subtitle";

    headerDiv.appendChild(title);
    headerDiv.appendChild(subtitle);
    container.appendChild(headerDiv);

    // 2. Wadah Grid Kartu
    const gridContainer = document.createElement("div");
    gridContainer.className = "dash-grid";
    gridContainer.id = "dash-grid-container";

    // Tampilkan loading skeleton/teks
    gridContainer.innerHTML = '<div class="loading-text" style="grid-column: 1 / -1;">Menghitung metrik S.I.W.A.R.G.A dari Database Master & Transaksi...</div>';
    container.appendChild(gridContainer);

    // 3. Tarik Data Kalkulasi dari Backend
    google.script.run
      .withSuccessHandler((stats) => {
        // Update Subtitle
        document.getElementById("dash-subtitle").textContent = `Data mutakhir diperbarui secara Real-Time. Periode Aktif: ${stats.bulanIniStr}`;

        // Bersihkan loading
        gridContainer.innerHTML = "";

        // HELPER: Pabrik Pembuat Kartu
        function createCard(titleTxt, valueTxt, iconSvg, colorClass) {
          const card = document.createElement("div");
          card.className = "dash-card";

          const iconWrap = document.createElement("div");
          iconWrap.className = `dash-icon-wrap ${colorClass}`;
          iconWrap.innerHTML = iconSvg; // Menggunakan SVG Murni

          const infoWrap = document.createElement("div");
          infoWrap.className = "dash-info";

          const h3 = document.createElement("h3");
          h3.textContent = titleTxt;

          const p = document.createElement("p");
          p.textContent = valueTxt;

          infoWrap.appendChild(h3);
          infoWrap.appendChild(p);
          card.appendChild(iconWrap);
          card.appendChild(infoWrap);

          return card;
        }

        // Definisi Ikon Vektor
        const svgUsers = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`;
        const svgActive = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
        const svgMoney = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path></svg>`;
        const svgTrending = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>`;

        // Rakit 4 Kartu Metrik
        gridContainer.appendChild(createCard("Total Penghuni (Warga)", `${stats.totalWarga} KK`, svgUsers, "dash-icon-blue"));
        gridContainer.appendChild(createCard("Warga Status Aktif", `${stats.wargaAktif} KK`, svgActive, "dash-icon-purple"));
        gridContainer.appendChild(createCard("Total Kas Lingkungan", `Rp ${stats.totalKas.toLocaleString("id-ID")}`, svgMoney, "dash-icon-green"));
        gridContainer.appendChild(createCard(`Pemasukan ${stats.bulanIniStr}`, `Rp ${stats.kasBulanIni.toLocaleString("id-ID")}`, svgTrending, "dash-icon-amber"));
      })
      .withFailureHandler((error) => {
        gridContainer.innerHTML = `<div class="loading-text" style="color:red; grid-column: 1/-1;">Error Analytics: ${error.message}</div>`;
      })
      .getDashboardSummary(UI_STATE.user);
  }

  /**
   * ==========================================
   * VIEW: DATA PENDUDUK (PRODUCTION LOCK)
   * ==========================================
   */
  function renderViewDataPenduduk(container) {
    const headerDiv = document.createElement("div");
    headerDiv.style.display = "flex";
    headerDiv.style.justifyContent = "space-between";
    headerDiv.style.alignItems = "center";
    headerDiv.style.marginBottom = "1.5rem";

    const title = document.createElement("h2");
    title.textContent = "Buku Induk Penduduk";
    title.style.color = "#0f172a";

    const btnAdd = document.createElement("button");
    btnAdd.className = "btn-primary";
    btnAdd.textContent = "+ Tambah Warga";
    btnAdd.onclick = () => openWargaModal("ADD", null, tableContainer);

    headerDiv.appendChild(title);
    headerDiv.appendChild(btnAdd);
    container.appendChild(headerDiv);

    const tableContainer = document.createElement("div");
    tableContainer.id = "tableContainerWarga";
    container.appendChild(tableContainer);

    loadWargaTable(tableContainer);
  }

  // FUNGSI MEMUAT TABEL DATA PENDUDUK (DENGAN PAGINATION & FREEZE SCROLL)
  function loadWargaTable(container) {
    container.innerHTML = '<div class="loading-text">Menyinkronkan data dengan database...</div>';

    google.script.run
      .withSuccessHandler((dataWarga) => {
        container.innerHTML = "";

        // VARIABEL STATE PAGINASI CLIENT-SIDE
        let currentPage = 1;
        let rowsPerPage = 10;
        let currentFilteredData = dataWarga; // Menyimpan data yang sedang terfilter

        // 1. TOOLBAR FILTER
        const toolbar = document.createElement("div");
        toolbar.className = "table-toolbar";
        const searchInput = document.createElement("input");
        searchInput.type = "text";
        searchInput.className = "form-control toolbar-search";
        searchInput.placeholder = "Cari Nama, Username, Blok...";
        const filterRole = document.createElement("select");
        filterRole.className = "form-control toolbar-filter";
        filterRole.innerHTML = `<option value="ALL">Semua Hak Akses</option><option value="SUPER_ADMIN">Super Admin</option><option value="KETUA_RT">Ketua RT</option><option value="PENGURUS">Pengurus</option><option value="KORLAP_GANG">Korlap Gang</option><option value="WARGA">Warga</option>`;
        const filterStatus = document.createElement("select");
        filterStatus.className = "form-control toolbar-filter";
        filterStatus.innerHTML = `<option value="ALL">Semua Status</option><option value="AKTIF">Aktif</option><option value="NON-AKTIF">Non-Aktif</option>`;

        toolbar.appendChild(searchInput);
        toolbar.appendChild(filterRole);
        toolbar.appendChild(filterStatus);
        container.appendChild(toolbar);

        // 2. KERANGKA TABEL
        const wrap = document.createElement("div");
        wrap.className = "table-container";
        const scroll = document.createElement("div");
        scroll.className = "table-wrapper";
        const table = document.createElement("table");
        table.className = "enterprise-table";
        const thead = document.createElement("thead");
        const trHead = document.createElement("tr");
        ["USERNAME", "NAMA", "BLOK", "JABATAN", "ROLE", "STATUS", "AKSI"].forEach((t) => {
          const th = document.createElement("th");
          th.textContent = t;
          trHead.appendChild(th);
        });
        thead.appendChild(trHead);
        table.appendChild(thead);
        const tbody = document.createElement("tbody");
        table.appendChild(tbody);
        scroll.appendChild(table);
        wrap.appendChild(scroll);

        // 3. KERANGKA PAGINASI (Di bawah tabel)
        const paginationBar = document.createElement("div");
        paginationBar.className = "pagination-toolbar";
        const pageInfo = document.createElement("div");

        const pageControls = document.createElement("div");
        pageControls.className = "pagination-controls";

        // Dropdown jumlah baris
        const limitSelect = document.createElement("select");
        limitSelect.className = "form-control";
        limitSelect.style.width = "auto";
        limitSelect.style.padding = "0.3rem";
        [10, 25, 50, 100].forEach((val) => {
          const opt = document.createElement("option");
          opt.value = val;
          opt.textContent = `${val} Baris`;
          limitSelect.appendChild(opt);
        });

        const btnPrev = document.createElement("button");
        btnPrev.className = "btn-page";
        btnPrev.textContent = "Sebelumnya";
        const btnNext = document.createElement("button");
        btnNext.className = "btn-page";
        btnNext.textContent = "Selanjutnya";

        pageControls.appendChild(limitSelect);
        pageControls.appendChild(btnPrev);
        pageControls.appendChild(btnNext);
        paginationBar.appendChild(pageInfo);
        paginationBar.appendChild(pageControls);
        wrap.appendChild(paginationBar);
        container.appendChild(wrap);

        // 4. MESIN RENDER BARIS BERDASARKAN HALAMAN
        function renderRows() {
          tbody.innerHTML = "";

          // Kalkulasi Paginasi
          const totalRows = currentFilteredData.length;
          const totalPages = Math.ceil(totalRows / rowsPerPage) || 1;

          if (currentPage > totalPages) currentPage = totalPages;
          if (currentPage < 1) currentPage = 1;

          const startIndex = (currentPage - 1) * rowsPerPage;
          const endIndex = startIndex + rowsPerPage;
          const pageData = currentFilteredData.slice(startIndex, endIndex); // Potong data sesuai halaman

          // Update UI Paginasi
          pageInfo.innerHTML = `Menampilkan <strong>${totalRows === 0 ? 0 : startIndex + 1} - ${Math.min(endIndex, totalRows)}</strong> dari <strong>${totalRows}</strong> data`;
          btnPrev.disabled = currentPage === 1;
          btnNext.disabled = currentPage === totalPages || totalRows === 0;

          if (totalRows === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 2rem; color: #64748b;">Data tidak ditemukan.</td></tr>';
            return;
          }

          pageData.forEach((warga) => {
            const tr = document.createElement("tr");
            const tdUser = document.createElement("td");
            tdUser.textContent = warga.USERNAME;
            tdUser.style.color = "#64748b";
            tr.appendChild(tdUser);
            const tdNama = document.createElement("td");
            tdNama.textContent = warga.NAMA;
            tdNama.style.fontWeight = "700";
            tr.appendChild(tdNama);
            const tdBlok = document.createElement("td");
            tdBlok.textContent = warga.BLOK_RUMAH;
            tr.appendChild(tdBlok);
            const tdJabatan = document.createElement("td");
            tdJabatan.textContent = warga.JABATAN;
            tr.appendChild(tdJabatan);

            const tdRole = document.createElement("td");
            const badgeRole = document.createElement("span");
            badgeRole.className = "badge";
            badgeRole.textContent = warga.ROLE;
            if (["SUPER_ADMIN", "KETUA_RT"].includes(warga.ROLE)) badgeRole.classList.add("badge-admin");
            else if (["SEKRETARIS", "BENDAHARA", "KORLAP_GANG"].includes(warga.ROLE)) badgeRole.classList.add("badge-pengurus");
            else badgeRole.classList.add("badge-warga");
            tdRole.appendChild(badgeRole);
            tr.appendChild(tdRole);

            const tdStatus = document.createElement("td");
            const badgeStatus = document.createElement("span");
            badgeStatus.className = warga.STATUS === "AKTIF" ? "badge badge-aktif" : "badge badge-admin";
            badgeStatus.textContent = warga.STATUS;
            tdStatus.appendChild(badgeStatus);
            tr.appendChild(tdStatus);

            const tdAksi = document.createElement("td");
            const btnEdit = document.createElement("button");
            btnEdit.className = "btn-edit";
            btnEdit.textContent = "Edit";
            btnEdit.onclick = () => openWargaModal("EDIT", warga, container);
            const btnDel = document.createElement("button");
            btnDel.className = "btn-danger";
            btnDel.textContent = "Hapus";
            btnDel.onclick = () => confirmDeleteWarga(warga.USERNAME, warga.NAMA, container);
            tdAksi.appendChild(btnEdit);
            tdAksi.appendChild(btnDel);
            tr.appendChild(tdAksi);
            tbody.appendChild(tr);
          });
        }

        // 5. EVENT LISTENERS PAGINASI
        btnPrev.addEventListener("click", () => {
          if (currentPage > 1) {
            currentPage--;
            renderRows();
          }
        });
        btnNext.addEventListener("click", () => {
          const maxPage = Math.ceil(currentFilteredData.length / rowsPerPage);
          if (currentPage < maxPage) {
            currentPage++;
            renderRows();
          }
        });
        limitSelect.addEventListener("change", (e) => {
          rowsPerPage = parseInt(e.target.value);
          currentPage = 1;
          renderRows();
        });

        // 6. MESIN FILTER
        function applyFilters() {
          const keyword = searchInput.value.toLowerCase();
          const selRole = filterRole.value;
          const selStatus = filterStatus.value;
          currentFilteredData = dataWarga.filter((warga) => {
            const textMatch = warga.NAMA.toLowerCase().includes(keyword) || warga.USERNAME.toLowerCase().includes(keyword) || warga.BLOK_RUMAH.toLowerCase().includes(keyword) || warga.JABATAN.toLowerCase().includes(keyword);
            const roleMatch = selRole === "ALL" || warga.ROLE === selRole;
            const statusMatch = selStatus === "ALL" || warga.STATUS === selStatus;
            return textMatch && roleMatch && statusMatch;
          });
          currentPage = 1; // Kembali ke halaman 1 setiap kali filter berubah
          renderRows();
        }

        searchInput.addEventListener("input", applyFilters);
        filterRole.addEventListener("change", applyFilters);
        filterStatus.addEventListener("change", applyFilters);

        renderRows(); // Render pertama kali
      })
      .withFailureHandler((error) => {
        container.innerHTML = `<div class="loading-text" style="color:red;">Error: ${error.message}</div>`;
      })
      .getAllWarga(UI_STATE.user);
  }

  function openWargaModal(mode, data = null, tableContainer) {
    const oldModal = document.getElementById("crudModal");
    if (oldModal) oldModal.remove();

    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.id = "crudModal";

    const box = document.createElement("div");
    box.className = "modal-box";

    const header = document.createElement("div");
    header.className = "modal-header";
    header.textContent = mode === "ADD" ? "Form Tambah Penduduk" : "Edit Data Penduduk";

    const btnClose = document.createElement("button");
    btnClose.innerHTML = "&times;";
    btnClose.style.background = "none";
    btnClose.style.border = "none";
    btnClose.style.fontSize = "1.5rem";
    btnClose.style.cursor = "pointer";
    btnClose.onclick = () => overlay.remove();
    header.appendChild(btnClose);

    const body = document.createElement("div");
    body.className = "modal-body";

    function createInput(labelTxt, id, val, type = "text", isReadonly = false) {
      const grp = document.createElement("div");
      grp.className = "form-group";
      const lbl = document.createElement("label");
      lbl.textContent = labelTxt;
      const inp = document.createElement("input");
      inp.className = "form-control";
      inp.type = type;
      inp.id = "mod_" + id;
      inp.value = val || "";
      if (isReadonly) {
        inp.readOnly = true;
        inp.style.backgroundColor = "#f1f5f9";
      }
      grp.appendChild(lbl);
      grp.appendChild(inp);
      body.appendChild(grp);
    }

    function createSelect(labelTxt, id, val, optionsArr) {
      const grp = document.createElement("div");
      grp.className = "form-group";
      const lbl = document.createElement("label");
      lbl.textContent = labelTxt;
      const sel = document.createElement("select");
      sel.className = "form-control";
      sel.id = "mod_" + id;
      optionsArr.forEach((opt) => {
        const o = document.createElement("option");
        o.value = opt;
        o.textContent = opt;
        if (val === opt) o.selected = true;
        sel.appendChild(o);
      });
      grp.appendChild(lbl);
      grp.appendChild(sel);
      body.appendChild(grp);
    }

    createInput("Username (Unik)", "username", data ? data.USERNAME : "", "text", mode === "EDIT");
    createInput("Nama Lengkap", "nama", data ? data.NAMA_LENGKAP || data.NAMA : "");
    createInput("Password", "password", data ? data.PASSWORD : "warga123");

    // ==============================================================
    // [UI/UX ENTERPRISE] CUSTOM FIELD: GANG & NOMOR (ANTI-ERROR)
    // ==============================================================
    let defaultGang = "";
    let defaultNo = "";
    if (data && data.BLOK_RUMAH) {
      const parts = data.BLOK_RUMAH.split("/");
      defaultGang = parts[0] || "";
      defaultNo = parts[1] || "";
    }

    // Ekstraksi (Scraping) Nama Gang yang sudah ada langsung dari Tabel DOM (Zero-Latency)
    const uniqueGangs = new Set();
    const tbodyRows = tableContainer.querySelectorAll("tbody tr");
    tbodyRows.forEach((tr) => {
      const blokCell = tr.children[2]; // Kolom BLOK selalu ada di indeks ke-2
      if (blokCell && blokCell.textContent.includes("/")) {
        uniqueGangs.add(blokCell.textContent.split("/")[0].trim());
      }
    });

    const grpBlok = document.createElement("div");
    grpBlok.className = "form-group";
    const lblBlok = document.createElement("label");
    lblBlok.textContent = "Alamat Warga (Ketik/Pilih Gang dan Nomor)";
    grpBlok.appendChild(lblBlok);

    // Mesin Datalist (EnumList Dinamis yang mengizinkan input manual)
    const datalistId = "gang-suggestions";
    const datalist = document.createElement("datalist");
    datalist.id = datalistId;
    uniqueGangs.forEach((g) => {
      const opt = document.createElement("option");
      opt.value = g;
      datalist.appendChild(opt);
    });
    grpBlok.appendChild(datalist);

    const flexDiv = document.createElement("div");
    flexDiv.style.display = "flex";
    flexDiv.style.alignItems = "center";
    flexDiv.style.gap = "10px";

    const inpGang = document.createElement("input");
    inpGang.className = "form-control";
    inpGang.style.flex = "2";
    inpGang.type = "text";
    inpGang.id = "mod_gang";
    inpGang.placeholder = "Pilih / Ketik Gang";
    inpGang.value = defaultGang;
    inpGang.setAttribute("list", datalistId); // Pasangkan input dengan datalist

    const sep = document.createElement("span");
    sep.textContent = "/";
    sep.style.fontWeight = "bold";
    sep.style.color = "#64748b";

    const inpNo = document.createElement("input");
    inpNo.className = "form-control";
    inpNo.style.flex = "1";
    inpNo.type = "text";
    inpNo.id = "mod_no";
    inpNo.placeholder = "No. Rumah";
    inpNo.value = defaultNo;

    flexDiv.appendChild(inpGang);
    flexDiv.appendChild(sep);
    flexDiv.appendChild(inpNo);
    grpBlok.appendChild(flexDiv);
    body.appendChild(grpBlok);
    // ==============================================================

    createInput("Jabatan", "jabatan", data ? data.JABATAN : "Warga");
    createSelect("Hak Akses (Role)", "role", data ? data.ROLE : "WARGA", ["SUPER_ADMIN", "KETUA_RT", "SEKRETARIS", "BENDAHARA", "KORLAP_GANG", "WARGA"]);
    createSelect("Status", "status", data ? data.STATUS : "AKTIF", ["AKTIF", "NON-AKTIF"]);

    const errorText = document.createElement("div");
    errorText.style.color = "#ef4444";
    errorText.style.fontSize = "0.85rem";
    errorText.style.marginTop = "10px";
    body.appendChild(errorText);

    const footer = document.createElement("div");
    footer.className = "modal-footer";

    const btnBatal = document.createElement("button");
    btnBatal.className = "btn-secondary";
    btnBatal.textContent = "Batal";
    btnBatal.onclick = () => overlay.remove();

    const btnSimpan = document.createElement("button");
    btnSimpan.className = "btn-primary";
    btnSimpan.textContent = "Simpan Data";
    btnSimpan.onclick = () => {
      // Penyatuan otomatis dari dua input terpisah
      const gangVal = document.getElementById("mod_gang").value.trim();
      const noVal = document.getElementById("mod_no").value.trim();

      const payload = {
        USERNAME: document.getElementById("mod_username").value.trim(),
        NAMA_LENGKAP: document.getElementById("mod_nama").value.trim(),
        PASSWORD: document.getElementById("mod_password").value.trim(),
        BLOK_RUMAH: gangVal && noVal ? `${gangVal}/${noVal}` : "", // Konversi ke format baku "Gang/No"
        JABATAN: document.getElementById("mod_jabatan").value.trim(),
        ROLE: document.getElementById("mod_role").value,
        STATUS: document.getElementById("mod_status").value,
      };

      if (!payload.USERNAME || !payload.NAMA_LENGKAP) {
        errorText.textContent = "Username dan Nama wajib diisi.";
        return;
      }
      if (!gangVal || !noVal) {
        errorText.textContent = "Gang/Blok dan Nomor Rumah wajib diisi dengan lengkap.";
        return;
      }

      btnSimpan.textContent = "Menyimpan...";
      btnSimpan.disabled = true;
      errorText.textContent = "";

      const action =
        mode === "ADD"
          ? google.script.run
              .withSuccessHandler((msg) => {
                overlay.remove();
                showToast(msg || "Data berhasil ditambahkan", "success");
                if (tableContainer.id === "tableContainerManajemen") {
                  loadManajemenWargaTable(tableContainer);
                } else {
                  loadWargaTable(tableContainer);
                }
              })
              .withFailureHandler((err) => {
                btnSimpan.textContent = "Simpan Data";
                btnSimpan.disabled = false;
                errorText.textContent = err.message;
              })
              .createWarga(UI_STATE.user, payload)
          : google.script.run
              .withSuccessHandler((msg) => {
                overlay.remove();
                showToast(msg || "Data berhasil diperbarui", "success");
                if (tableContainer.id === "tableContainerManajemen") {
                  loadManajemenWargaTable(tableContainer);
                } else {
                  loadWargaTable(tableContainer);
                }
              })
              .withFailureHandler((err) => {
                btnSimpan.textContent = "Simpan Data";
                btnSimpan.disabled = false;
                errorText.textContent = err.message;
              })
              .updateWarga(UI_STATE.user, data.USERNAME, payload);
    };

    footer.appendChild(btnBatal);
    footer.appendChild(btnSimpan);
    box.appendChild(header);
    box.appendChild(body);
    box.appendChild(footer);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    setTimeout(() => overlay.classList.add("show"), 10);
  }

  function confirmDeleteWarga(username, nama, tableContainer) {
    // Memanggil Custom Confirm Dialog
    showConfirm("Konfirmasi Penghapusan", `Apakah Anda yakin ingin menghapus data warga [${nama}]? Tindakan ini bersifat permanen dan akan menghapus akses login warga tersebut.`, () => {
      tableContainer.innerHTML = '<div class="loading-text">Menghapus data...</div>';
      google.script.run
        .withSuccessHandler((msg) => {
          showToast(msg, "success"); // Menggunakan Toast
          if (tableContainer.id === "tableContainerManajemen") {
            loadManajemenWargaTable(tableContainer);
          } else {
            loadWargaTable(tableContainer);
          }
        })
        .withFailureHandler((err) => {

      btnSimpan.disabled = true;
      errorText.textContent = "";

      const reader = new FileReader();
      reader.onloadend = function () {
        const payload = {
          NOMINAL: nominal,
          BULAN_DIBAYAR: bulan,
          base64File: reader.result,
          fileName: file.name,
        };

        google.script.run
          .withSuccessHandler((msg) => {
            overlay.remove();
            showToast(msg, "success");
            loadIuranSayaTable(tableContainer, UI_STATE.user.username);
          })
          .withFailureHandler((err) => {
            btnSimpan.textContent = "Kirim Bukti Pembayaran";
            btnSimpan.disabled = false;
            errorText.textContent = err.message;
          })
          .submitBuktiTransfer(UI_STATE.user, payload);
      };
      reader.readAsDataURL(file); // Konversi gambar!
    };

    footer.appendChild(btnBatal);
    footer.appendChild(btnSimpan);
    box.appendChild(header);
    box.appendChild(body);
    box.appendChild(footer);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    setTimeout(() => overlay.classList.add("show"), 10);
  }

        ["WAKTU BAYAR", "ID TRANSAKSI", "BULAN TAGIHAN", "DITERIMA OLEH", "NOMINAL"].forEach((t) => {
          const th = document.createElement("th");
          th.textContent = t;
          trHead.appendChild(th);
        });
        thead.appendChild(trHead);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        table.appendChild(tbody);
        scroll.appendChild(table);
        wrap.appendChild(scroll);
        container.appendChild(wrap);

        // 4. Mesin Render Baris & Kalkulator Kas Dinamis
        function renderRows(data) {
          tbody.innerHTML = "";

          // Kalkulasi Total Personal Dinamis berdasarkan hasil filter
          let totalSaldo = 0;
          data.forEach((trx) => (totalSaldo += parseFloat(trx.NOMINAL || 0)));
          const saldoElement = document.getElementById("mySaldoTotal");
          if (saldoElement) saldoElement.textContent = "Rp " + totalSaldo.toLocaleString("id-ID");

          if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 2rem; color: #64748b;">Belum ada riwayat pembayaran yang tercatat atau sesuai dengan filter Anda.</td></tr>';
            return;
          }

          data.forEach((trx) => {
            const tr = document.createElement("tr");
            const tdTime = document.createElement("td");
            tdTime.textContent = trx.TIMESTAMP;
            tdTime.style.color = "#64748b";
            tdTime.style.fontSize = "0.85rem";
            tr.appendChild(tdTime);
            const tdId = document.createElement("td");
            tdId.textContent = trx.ID_TRANSAKSI;
            tdId.style.fontWeight = "700";
            tr.appendChild(tdId);
            const tdBulan = document.createElement("td");
            const badgeBulan = document.createElement("span");
            badgeBulan.className = "badge badge-aktif";
            badgeBulan.textContent = trx.BULAN_DIBAYAR;
            tdBulan.appendChild(badgeBulan);
            tr.appendChild(tdBulan);
            const tdPetugas = document.createElement("td");
            tdPetugas.textContent = trx.PETUGAS;
            tr.appendChild(tdPetugas);
            const tdNominal = document.createElement("td");
            tdNominal.textContent = "Rp " + parseFloat(trx.NOMINAL).toLocaleString("id-ID");
            tdNominal.style.fontWeight = "700";
            tdNominal.style.color = "#2563eb";
            tr.appendChild(tdNominal);
            tbody.appendChild(tr);
          });
        }

        // 5. Mesin Filter Multi-Lapisan
        function applyFilters() {
          const keyword = searchInput.value.toLowerCase();
          const selBulan = filterBulan.value;
          const selPetugas = filterPetugas.value;

          const filteredData = dataTrx.filter((trx) => {
            const textMatch = trx.ID_TRANSAKSI.toLowerCase().includes(keyword);
            const bulanMatch = selBulan === "ALL" || trx.BULAN_DIBAYAR === selBulan;
            const petugasMatch = selPetugas === "ALL" || trx.PETUGAS === selPetugas;
            return textMatch && bulanMatch && petugasMatch;
          });

          // Render ulang (sekaligus meng-update total saldo di Kartu Biru)
          renderRows(filteredData);
        }

        // 6. Pasang Pemicu Filter (Event Listener)
        searchInput.addEventListener("input", applyFilters);
        filterBulan.addEventListener("change", applyFilters);
        filterPetugas.addEventListener("change", applyFilters);

        // Eksekusi Render Pertama (Menampilkan Seluruh Data)
        renderRows(dataTrx);
      })
      .withFailureHandler((err) => {
        container.innerHTML = `<div class="loading-text" style="color:red;">Error Akses Data: ${err.message}</div>`;
      })
      .getTransaksiByUser(UI_STATE.user, username);
  }

    container.innerHTML = '<div class="loading-text">Menyinkronkan data pemetaan warga...</div>';

    google.script.run
      .withSuccessHandler((dataWarga) => {
        container.innerHTML = "";
        const isCRUDAllowed = ["SUPER_ADMIN", "KETUA_RT"].includes(UI_STATE.user.role);

        // 1. PEMETAAN OTOMATIS UNTUK KORLAP GANG
        let baseData = dataWarga;
        let infoMapping = "";

        if (UI_STATE.user.role === "KORLAP_GANG") {
          // Ekstrak nama gang, misal: dari "Blok A/1" menjadi "Blok A"
          const gangPrefix = UI_STATE.user.blokRumah.split("/")[0];
          baseData = dataWarga.filter((w) => w.BLOK_RUMAH.startsWith(gangPrefix));

          infoMapping = `<div style="padding: 10px 15px; background: #eff6ff; color: #1d4ed8; border-radius: 8px; margin-bottom: 15px; font-weight: 600; font-size: 0.9rem; border-left: 4px solid #2563eb;">📍 Otoritas Terbatas: Menampilkan pemetaan khusus wilayah ${gangPrefix}</div>`;
        }

        if (infoMapping) container.innerHTML += infoMapping;

        // 2. STATE PAGINASI
        let currentPage = 1;
        let rowsPerPage = 10;
        let currentFilteredData = baseData;

        // Ekstrak nama blok unik untuk dropdown (dari data yang sudah dipetakan)
        const uniqueBlok = [...new Set(baseData.map((item) => item.BLOK_RUMAH.split("/")[0]))];

        // 3. TOOLBAR FILTERING
        const toolbar = document.createElement("div");
        toolbar.className = "table-toolbar";
        const searchInput = document.createElement("input");
        searchInput.type = "text";
        searchInput.className = "form-control toolbar-search";
        searchInput.placeholder = "Cari Nama Warga...";

        const filterBlok = document.createElement("select");
        filterBlok.className = "form-control toolbar-filter";
        filterBlok.innerHTML = `<option value="ALL">Semua Wilayah</option>` + uniqueBlok.map((b) => `<option value="${b}">${b}</option>`).join("");

        toolbar.appendChild(searchInput);
        toolbar.appendChild(filterBlok);
        container.appendChild(toolbar);

        // 4. KERANGKA TABEL
        const wrap = document.createElement("div");
        wrap.className = "table-container";
        const scroll = document.createElement("div");
        scroll.className = "table-wrapper";
        const table = document.createElement("table");
        table.className = "enterprise-table";
        const thead = document.createElement("thead");
        const trHead = document.createElement("tr");

        const columns = ["USERNAME", "NAMA", "BLOK", "JABATAN", "ROLE", "STATUS"];
        if (isCRUDAllowed) columns.push("AKSI"); // Kolom aksi hanya untuk yang berwenang

        columns.forEach((t) => {
          const th = document.createElement("th");
          th.textContent = t;
          trHead.appendChild(th);
        });
        thead.appendChild(trHead);
        table.appendChild(thead);
        const tbody = document.createElement("tbody");
        table.appendChild(tbody);
        scroll.appendChild(table);
        wrap.appendChild(scroll);

        // 5. KERANGKA PAGINASI
        const paginationBar = document.createElement("div");
        paginationBar.className = "pagination-toolbar";
        const pageInfo = document.createElement("div");
        const pageControls = document.createElement("div");
        pageControls.className = "pagination-controls";
        const limitSelect = document.createElement("select");
        limitSelect.className = "form-control";
        limitSelect.style.width = "auto";
        limitSelect.style.padding = "0.3rem";
        [10, 25, 50, 100].forEach((val) => {
          const opt = document.createElement("option");
          opt.value = val;
          opt.textContent = `${val} Baris`;
          limitSelect.appendChild(opt);
        });
        const btnPrev = document.createElement("button");
        btnPrev.className = "btn-page";
        btnPrev.textContent = "Sebelumnya";
        const btnNext = document.createElement("button");
        btnNext.className = "btn-page";
        btnNext.textContent = "Selanjutnya";

        pageControls.appendChild(limitSelect);
        pageControls.appendChild(btnPrev);
        pageControls.appendChild(btnNext);
        paginationBar.appendChild(pageInfo);
        paginationBar.appendChild(pageControls);
        wrap.appendChild(paginationBar);
        container.appendChild(wrap);

        // 6. MESIN RENDER BARIS
        function renderRows() {
          tbody.innerHTML = "";
          const totalRows = currentFilteredData.length;
          const totalPages = Math.ceil(totalRows / rowsPerPage) || 1;
          if (currentPage > totalPages) currentPage = totalPages;
          if (currentPage < 1) currentPage = 1;
          const startIndex = (currentPage - 1) * rowsPerPage;
          const endIndex = startIndex + rowsPerPage;
          const pageData = currentFilteredData.slice(startIndex, endIndex);

          pageInfo.innerHTML = `Menampilkan <strong>${totalRows === 0 ? 0 : startIndex + 1} - ${Math.min(endIndex, totalRows)}</strong> dari <strong>${totalRows}</strong> warga`;
          btnPrev.disabled = currentPage === 1;
          btnNext.disabled = currentPage === totalPages || totalRows === 0;

          if (totalRows === 0) {
            tbody.innerHTML = `<tr><td colspan="${columns.length}" style="text-align:center; padding: 2rem; color: #64748b;">Data pemetaan kosong.</td></tr>`;
            return;
          }

          pageData.forEach((warga) => {
            const tr = document.createElement("tr");

            const tdUser = document.createElement("td");
            tdUser.textContent = warga.USERNAME;
            tdUser.style.color = "#64748b";
            tr.appendChild(tdUser);

            const tdNama = document.createElement("td");
            // Mengatasi perbedaan key NAMA_LENGKAP vs NAMA
            tdNama.textContent = warga.NAMA_LENGKAP || warga.NAMA;
            tdNama.style.fontWeight = "700";
            tr.appendChild(tdNama);

            const tdBlok = document.createElement("td");
            tdBlok.textContent = warga.BLOK_RUMAH;
            tr.appendChild(tdBlok);

            const tdJabatan = document.createElement("td");
            tdJabatan.textContent = warga.JABATAN;
            tr.appendChild(tdJabatan);

            const tdRole = document.createElement("td");
            const badgeRole = document.createElement("span");
            badgeRole.className = "badge";
            badgeRole.textContent = warga.ROLE;
            if (["SUPER_ADMIN", "KETUA_RT"].includes(warga.ROLE)) badgeRole.classList.add("badge-admin");
            else if (["SEKRETARIS", "BENDAHARA", "KORLAP_GANG"].includes(warga.ROLE)) badgeRole.classList.add("badge-pengurus");
            else badgeRole.classList.add("badge-warga");
            tdRole.appendChild(badgeRole);
            tr.appendChild(tdRole);

            const tdStatus = document.createElement("td");
            const badgeStatus = document.createElement("span");
            badgeStatus.className = warga.STATUS === "AKTIF" ? "badge badge-aktif" : "badge badge-admin";
            badgeStatus.textContent = warga.STATUS;
            tdStatus.appendChild(badgeStatus);
            tr.appendChild(tdStatus);

            if (isCRUDAllowed) {
              const tdAksi = document.createElement("td");
              const btnEdit = document.createElement("button");
              btnEdit.className = "btn-edit";
              btnEdit.textContent = "Edit";
              btnEdit.onclick = () => openWargaModal("EDIT", warga, container);
              const btnDel = document.createElement("button");
              btnDel.className = "btn-danger";
              btnDel.textContent = "Hapus";
              btnDel.onclick = () => confirmDeleteWarga(warga.USERNAME, warga.NAMA_LENGKAP || warga.NAMA, container);
              tdAksi.appendChild(btnEdit);
              tdAksi.appendChild(btnDel);
              tr.appendChild(tdAksi);
            }
            tbody.appendChild(tr);
          });
        }

        btnPrev.addEventListener("click", () => {
          if (currentPage > 1) {
            currentPage--;
            renderRows();
          }
        });
        btnNext.addEventListener("click", () => {
          const maxPage = Math.ceil(currentFilteredData.length / rowsPerPage);
          if (currentPage < maxPage) {
            currentPage++;
            renderRows();
          }
        });
        limitSelect.addEventListener("change", (e) => {
          rowsPerPage = parseInt(e.target.value);
          currentPage = 1;
          renderRows();
        });

        function applyFilters() {
          const keyword = searchInput.value.toLowerCase();
          const selBlok = filterBlok.value;
          currentFilteredData = baseData.filter((w) => {
            const textMatch = (w.NAMA_LENGKAP || w.NAMA).toLowerCase().includes(keyword) || w.USERNAME.toLowerCase().includes(keyword);
            const blokMatch = selBlok === "ALL" || w.BLOK_RUMAH.startsWith(selBlok);
            return textMatch && blokMatch;
          });
          currentPage = 1;
          renderRows();
        }

        searchInput.addEventListener("input", applyFilters);
        filterBlok.addEventListener("change", applyFilters);
        renderRows();
      })
      .withFailureHandler((err) => {
        container.innerHTML = `<div class="loading-text" style="color:red;">Error Akses: ${err.message}</div>`;
      })
      .getAllWarga(UI_STATE.user);
  }

    btnSave.style.marginTop = "0.5rem";

    btnSave.onclick = () => {
      const newU = document.getElementById("prof_user").value.trim();
      const newP = document.getElementById("prof_pass").value.trim();

      if (!newU) {
        showToast("Kolom Username tidak boleh kosong!", "error");
        return;
      }

      btnSave.textContent = "Memproses...";
      btnSave.disabled = true;

      google.script.run
        .withSuccessHandler((msg) => {
          showToast(msg, "success");
          btnSave.textContent = "Simpan Kredensial";
          btnSave.disabled = false;
          // Perbarui sesi state UI secara diam-diam agar user tidak perlu relogin!
          UI_STATE.user.username = newU;
        })
        .withFailureHandler((err) => {
          showToast(err.message, "error");
          btnSave.textContent = "Simpan Kredensial";
          btnSave.disabled = false;
        })
        .updateMyCredentials(UI_STATE.user, newU, newP);
    };

    card.appendChild(btnSave);
    container.appendChild(card);
  }
</script>
